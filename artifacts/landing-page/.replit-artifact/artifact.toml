kind = "web"
previewPath = "/"
title = "Landing Page — 150 Atividades"
version = "1.0.0"
id = "artifacts/landing-page"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18083

[services.development]
run = "pnpm --filter @workspace/landing-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/landing-page", "run", "build" ]
serve = "static"
publicDir = "artifacts/landing-page/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18083"
BASE_PATH = "/"
